version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: job-importer
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: job-importer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: job-importer-server
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongodb:27017/job-importer
      - REDIS_URL=redis://redis:6379
      - BATCH_SIZE=100
      - MAX_CONCURRENCY=3
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: job-importer-client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
